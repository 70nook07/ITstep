<!DOCTYPE html>
<html lang="en">
<head>
  <title>Merged Tasks</title>
  <style>
    body {
      font-family: Arial;
    }

    .container {
      text-align: center;
      margin-top: 20px;
    }

    hr {
      margin: 40px 0;
    }

    .traffic-wrapper {
      display: flex;
      justify-content: center;
      align-items: center;
      gap: 10px;
    }

    .traffic-box {
      display: flex;
      align-items: center;
      gap: 15px;
      border: 3px solid black;
      border-radius: 20px;
      padding: 15px;
    }

    .light {
      width: 38px;
      height: 38px;
      border-radius: 50%;
      background: gray;
    }

    .btn {
      height: 70px;
      border: 3px solid black;
      border-radius: 15px;
      padding: 0 20px;
      cursor: pointer;
      background: white;
    }
  </style>
</head>
<body>

<!-- TASK 1 -->
<div class="container">
  <h3>Task 1: Enter your name (name can't contain digits):</h3>
  <input type="text" id="nameInput">
</div>

<hr>

<!-- TASK 4 -->
<div class="container">
  <h3>Task 4: Traffic Light</h3>

  <div class="traffic-wrapper">
    <div class="traffic-box">
      <div id="red" class="light"></div>
      <div id="yellow" class="light"></div>
      <div id="green" class="light"></div>
    </div>

    <button type="button" class="btn" onclick="nextLight()">Next</button>
  </div>
</div>

<script>
  // Task 1
  let input = document.getElementById("nameInput");

  input.addEventListener("input", function () {
    this.value = this.value.replace(/[0-9]/g, "");
  });

  // Task 4
  let current = 0;
  let lights = ["red", "yellow", "green"];

  function nextLight() {
    for (let i = 0; i < lights.length; i++) {
      document.getElementById(lights[i]).style.background = "gray";
    }

    document.getElementById(lights[current]).style.background = lights[current];

    current++;
    if (current >= lights.length) {
      current = 0;
    }
  }
</script>

</body>
</html>
